name: signallost
description: Emergency SOS app using Bluetooth mesh networking — no internet required.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk:         flutter

  geolocator: ^10.0.0
  permission_handler: ^12.0.1


  # Add these for production features:
  flutter_bluetooth_serial: ^0.4.0   # Bluetooth mesh
  # wifi_iot: ^0.3.19                  # Wi-Fi Direct / P2P control
  # nearby_connections: ^4.0.0         # Google Nearby (BT + Wi-Fi P2P unified)
  # geolocator: ^10.0.0                # Real GPS
  # permission_handler: ^11.0.0        # Runtime permission requests
  # vibration: ^1.7.3                  # Haptic feedback
  # flutter_local_notifications: ^16.0.0 # Background alerts

  # Android — add to AndroidManifest.xml:
  #   <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
  #   <uses-permission android:name="android.permission.CHANGE_WIFI_STATE"/>
  #   <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
  #   <uses-permission android:name="android.permission.NEARBY_WIFI_DEVICES"
  #       android:usesPermissionFlags="neverForLocation"/>  <!-- API 33+ -->
  #
  # iOS — add to Info.plist:
  #   NSLocalNetworkUsageDescription — for MultipeerConnectivity (Wi-Fi P2P)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
